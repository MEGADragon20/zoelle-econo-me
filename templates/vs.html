{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto py-12 px-6">

    <!-- Top Labels -->
    <div class="flex justify-between mb-6 text-lg font-semibold text-gray-700">
        <span>Protektionismus</span>
        <span>Hyperglobalisierung</span>
    </div>

    <!-- Slider -->
    <div class="mb-10">
        <input 
            id="policySlider"
            type="range"
            min="1"
            max="5"
            step="1"
            value="3"
            class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
        >
        <div class="flex justify-between text-sm text-gray-500 mt-2">
            <span>*</span>
            <span>*</span>
            <span>*</span>
            <span>*</span>
            <span>*</span>
        </div>
    </div>

    <!-- Dynamic Content -->
    <div id="contentBox" class="bg-white shadow-lg rounded-2xl p-6 transition-all duration-300 md:grid md:grid-cols-2 gap-6">
        <img id="contentImage" src="" alt="" class="w-full h-64 object-cover rounded-xl mb-6 col-span-2">
        <div class="block">
            <h2 id="contentTitle" class="text-2xl font-bold mb-4"></h2>
            <p id="contentText" class="text-gray-600 text-lg"></p>
        </div>
        <div id="my-chart" class="bg-gray-100 shadow-lg rounded-2xl p-6 transition-all duration-300 block">

            <table class="charts-css column show-labels show-primary-axis data-spacing-20">
                <tr>
                    <th scope="row">Sicherheit</th>
                    <td id="security" style="--size: 0.4"><span class="data"></span></td>
                </tr>
                <tr>
                    <th scope="row">Wohlstand</th>
                    <td id="prosperity" style="--size: 0.6"><span class="data"></span></td>
                </tr>
            </table>
        </div>
        <!-- Berufsspezifische Auswirkungen -->
        <div class="md:grid md:grid-cols-3 gap-3 m-1 bg-gray-100 shadow-lg rounded-2xl p-6 transition-all duration-300 block col-span-2">
            <div class="bg-green-100 shadow-lg rounded-2xl col-span-1 block p-3">
                <h3 class="text-green-700 text-lg font-semibold">Landwirt</h3>
                <br>
                <img class="w-25 rounded-full" src="{{ url_for('images', image_name='farmer.png') }}" alt="Landwirt" class="w-full h-20 object-cover rounded-md mb-2">
                <br>
                <p class="text-sm text-center text-gray-700" id="farmer-text"></p>
            </div>
            <div class="bg-yellow-100 shadow-lg rounded-2xl col-span-1 block p-3">
                <h3 class="text-yellow-700 text-lg font-semibold">IT-Administrator</h3>
                <br>
                <img class="w-25 rounded-full" src="{{ url_for('images', image_name='it_admin.png') }}" alt="IT-Administrator" class="w-full h-20 object-cover rounded-md mb-2">
                <br>
                <p class="text-sm text-center text-gray-700" id="it-admin-text"></p>
            </div>
            <div class="bg-blue-100 shadow-lg rounded-2xl col-span-1 block p-3">
                <h3 class=" text-blue-700 text-lg font-semibold">Apothekerin</h3>
                <br>
                <img class="w-25 rounded-full" src="{{ url_for('images', image_name='apotekerin.png') }}" alt="Apothekerin" class="w-full h-20 object-cover rounded-md mb-2">
                <br>
                <p class="text-sm text-center text-gray-700" id="pharmacist-text"></p>
            </div>
        </div>

</div>

<!-- Fact Popup -->
<div id="factPopup" class="fixed inset-0 z-50 flex items-center justify-center p-4 pointer-events-none">
    <div id="factPopupInner"
        class="pointer-events-auto max-w-lg w-full bg-white border border-amber-200 shadow-2xl rounded-2xl p-6 
               transform transition-all duration-300 scale-95 opacity-0">
        <div class="flex items-start gap-4">
            <div class="flex-shrink-0 bg-amber-100 text-amber-600 rounded-full p-2">
                <!-- Lightbulb icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m1.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.346.346A3.737 3.737 0 0115 16.538V17a1 1 0 01-1 1h-4a1 1 0 01-1-1v-.462a3.737 3.737 0 01-1.1-2.591l-.345-.345z"/>
                </svg>
            </div>
            <div class="flex-1">
                <h3 class="text-sm font-semibold text-amber-700 uppercase tracking-wide mb-1">Wussten Sie schon?</h3>
                <p id="factPopupText" class="text-gray-700 text-sm leading-relaxed"></p>
            </div>
            <button id="factPopupClose"
                class="flex-shrink-0 text-gray-400 hover:text-gray-600 transition-colors duration-150 ml-2 mt-0.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    const slider = document.getElementById('policySlider');
    const image = document.getElementById('contentImage');
    const title = document.getElementById('contentTitle');
    const text = document.getElementById('contentText');
    const security = document.getElementById('security');
    const prosperity = document.getElementById('prosperity');
    const farmerText = document.getElementById('farmer-text');
    const itAdminText = document.getElementById('it-admin-text');
    const pharmacistText = document.getElementById('pharmacist-text');

    // Popup elements
    const factPopup = document.getElementById('factPopup');
    const factPopupInner = document.getElementById('factPopupInner');
    const factPopupText = document.getElementById('factPopupText');
    const factPopupClose = document.getElementById('factPopupClose');

    let popupTimeout = null;

    const contentData = {
        1: {
            img: "https://www.baseljetzt.ch/2024/11/Protektionismus-rte_p293736_6-4_1024w.jpg",
            title: "Autarkie",
            text: "High tariffs, strict trade barriers, and strong domestic industry protection.",
            fact: "Laut bpb-Daten importiert Deutschland Elektronik für 142,5 Mrd. €. Ohne diese Importe gäbe es in Deutschland kein einziges neues Smartphone oder Notebook mehr, da wir 0% der High-End-Mikrochips selbst herstellen.",
            security: 0.9,
            prosperity: 0.1,
            l: '„Meine Ernte ist sicher, aber die Preise sind hoch."',
            i: '„Völliger Stillstand. Ich kriege keine Chips, keine Hardware, nichts. Wir hängen technologisch in den 90ern fest."',
            a: '„Wir sind sicher! Keine Erpressung durch China mehr. Jede Pille wird hier produziert – Versorgung garantiert."'
        },
        2: {
            img: "https://www.freiheit.org/sites/default/files/styles/uv_full_content_large_16_9_webp/public/2025-03/507379016.jpg.webp?itok=Y5jNSPxo",
            title: "Moderater Protektionismus",
            text: "Selective tariffs and targeted support for strategic industries.",
            fact: "Deutschland exportiert Autos für 268,2 Mrd. € (17,2 % des Gesamtexports). Bei harten Zöllen bricht dieser Sektor ein. Das bedeutet: Jeder sechste Industriearbeitsplatz in Deutschland wäre sofort bedroht.",
            security: 0.7,
            prosperity: 0.3,
            l: "„Gute Zölle schützen meine Ernte. Wer regionale Qualität will, greift jetzt eben zu meinem Gemüse.“",
            i: "„Alles dauert ewig und kostet das Dreifache. Wie sollen wir so gegen das Silicon Valley bestehen?“",
            a: "„Wichtige Wirkstoffe kommen wieder aus Europa. Die Regale sind voll, wir sind nicht mehr erpressbar.“"
        },
        3: {
            img: "https://www.libinst.ch/wp-content/uploads/2023/05/freihandel-protektionismus-kreuzung-pfeile-1024x603.jpg",
            title: "Ausgewogene Herangehensweise",
            text: "Careful trade agreements combined with safeguards for local markets.",
            fact: 'Selbst bei diesem „Mittelweg" kostet die Unabhängigkeit: Die Rückverlagerung der Produktion nur der wichtigsten Medikamente würde das deutsche Gesundheitssystem laut IW Köln jährlich ca. 1,5 bis 2 Mrd. € extra kosten.',
            security: 0.5,
            prosperity: 0.5,
            l: "„Ein Kompromiss. Ich behalte meine Nische, solange die Importe aus Übersee nicht zu billig werden.“",
            i: "„Okay, wir bauen langsam eigene Kapazitäten in Europa auf. Mühsam, aber wir bleiben technologisch im Spiel.“",
            a: "„Eine solide Mischung. Wir haben Vorräte hier, nutzen aber für Standardmittel den Weltmarkt.“"
        },
        4: {
            img: "https://www.misesde.org/wp-content/uploads/2016/03/Welthandel.jpg",
            title: "Marktorientiert",
            text: "Lower trade barriers and broader international cooperation.",
            fact: "Deutschland ist extrem abhängig von Energieimporten. Wir importieren über 60 % unserer Energie (Öl, Gas, Kohle). Ein politischer Konflikt reicht, und trotz billiger Waren stehen bei uns die Fabriken still.",
            security: 0.3,
            prosperity: 0.7,
            l: "„Es wird eng. Überall ausländische Ware im Supermarkt. Ich muss schuften wie blöd, um preislich mitzuhalten.“",
            i: "„Läuft! Ich kriege die beste Hardware weltweit zum Top-Preis. Unsere Firmenkunden kaufen weltweit bei uns ein.“",
            a: "„Super Preise für meine Kunden! So bleibt Medizin für jeden im Land bezahlbar.“"
        },
        5: {
            img: "https://www.butz.de/wp-content/uploads/2024/08/ueberblick-globaler-handel-dp-552420844.jpg",
            title: "Hyperglobalisierung",
            text: "Full economic integration with minimal restrictions on trade.",
            fact: "Die Abhängigkeit ist total. Wenn nur ein einziger großer Hafen in Shanghai wegen eines Streiks schließt, fehlen in deutschen Apotheken innerhalb von 72 Stunden über 50 % der gängigen Antibiotika.",
            security: 0.1,
            prosperity: 0.9,
            l: "„Ein Desaster! Ich kann den Hof dichtmachen. Gegen industrielle Massenware aus Übersee habe ich keine Chance.“",
            i: "„Ein Traum! Alles ist vernetzt, maximal schnell und spottbillig. Das ist die digitale Freiheit!“",
            a: "„Effizienz pur! Wir kaufen dort, wo es am billigsten ist. Medizin ist ein günstiges Massengut für jeden.“"
        }
    };

    function showFactPopup(fact) {
        // Clear any pending auto-close
        if (popupTimeout) clearTimeout(popupTimeout);

        factPopupText.textContent = fact;

        // Trigger show animation
        factPopupInner.classList.remove('scale-95', 'opacity-0');
        factPopupInner.classList.add('scale-100', 'opacity-100');

        // Auto-dismiss after 6 seconds
        popupTimeout = setTimeout(hideFactPopup, 6000);
    }

    function hideFactPopup() {
        factPopupInner.classList.remove('scale-100', 'opacity-100');
        factPopupInner.classList.add('scale-95', 'opacity-0');
        if (popupTimeout) {
            clearTimeout(popupTimeout);
            popupTimeout = null;
        }
    }

    factPopupClose.addEventListener('click', hideFactPopup);

    // Close on backdrop click
    factPopup.addEventListener('click', (e) => {
        if (e.target === factPopup) hideFactPopup();
    });

    function updateContent(value, showPopup = false) {
        image.src = contentData[value].img;
        image.alt = contentData[value].title;
        title.textContent = contentData[value].title;
        text.textContent = contentData[value].text;
        security.style.setProperty('--size', contentData[value].security);
        prosperity.style.setProperty('--size', contentData[value].prosperity);
        farmerText.textContent = contentData[value].l;
        itAdminText.textContent = contentData[value].i;
        pharmacistText.textContent = contentData[value].a;

        if (showPopup) {
            showFactPopup(contentData[value].fact);
        }
    }

    slider.addEventListener('input', (e) => {
        updateContent(e.target.value, true);
    });

    // Initialize on load (no popup on first load)
    updateContent(slider.value, false);
</script>

{% endblock %}
