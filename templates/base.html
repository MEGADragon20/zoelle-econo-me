<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Zölle{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/charts.css/dist/charts.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

</head>
<style>
    body { font-family: 'Source Serif 4', serif; }
  .display-font { font-family: 'Playfair Display', serif; }
</style>
<body class="bg-gray-100">
    <header class="bg-white shadow">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <a href="/" class="text-2xl font-semibold text-gray-800">Zölle</a>
            <nav class="hidden md:flex space-x-6">
                <a href="/" class="text-gray-700 hover:text-blue-600">Home</a>
                <a href="/page/allgemeines" class="text-gray-700 hover:text-blue-600">Allgemeines</a>
                <a href="/page/entwicklung" class="text-gray-700 hover:text-blue-600">Entwicklung</a>
            </nav>
            <div class="md:hidden">
                <button id="nav-toggle" aria-label="Toggle navigation" class="text-gray-700 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
            </div>
        </div>
        <div id="mobile-menu" class="md:hidden hidden px-4 pb-4">
            <a href="/" class="block py-2 text-gray-700 hover:text-blue-600">Home</a>
            <a href="/page/allgemeines" class="block py-2 text-gray-700 hover:text-blue-600">Allgemeines</a>
            <a href="/page/entwicklung" class="block py-2 text-gray-700 hover:text-blue-600">Entwicklung</a>
        </div>
    </header>

    <main class="flex flex-col min-h-screen container mx-auto px-4 py-8">
        {% block content %}
        {% endblock %}
    </main>


    <footer class="bg-white shadow mt-auto bottom-0 w-full">
        <div class="container mx-auto px-4 py-4 text-center text-gray-600">
            &copy; 2026 Zölle. Alle Rechte vorbehalten.
            <p>Quellen: <span class="text-sm"><a href="{{ url_for('sources') }}">Übersicht</a></span></p>
        </div>
    <script>
        // Mobile menu toggle
        document.addEventListener('DOMContentLoaded', function () {
            var btn = document.getElementById('nav-toggle');
            var menu = document.getElementById('mobile-menu');
            if (btn) {
                btn.addEventListener('click', function () {
                    if (menu.classList.contains('hidden')) {
                        menu.classList.remove('hidden');
                    } else {
                        menu.classList.add('hidden');
                    }
                });
            }
        });
    </script>
</body>
</html>
