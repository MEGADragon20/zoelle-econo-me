{% extends "base.html" %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }
  .serif { font-family: 'DM Serif Display', serif; }

  .bg-paper {
    background-color: #faf7f2;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up { opacity: 0; animation: fadeUp 0.6s ease forwards; }

  @keyframes barGrow {
    from { width: 0%; }
    to   { width: var(--target-width); }
  }
  .bar-fill {
    animation: barGrow 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    animation-delay: 0.8s;
    width: 0%;
  }

  @keyframes needleSpin {
    from { transform: rotate(-90deg); }
    to   { transform: rotate(var(--needle-deg)); }
  }
  #needle {
    transform-origin: bottom center;
    animation: needleSpin 1.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    animation-delay: 0.5s;
    transform: rotate(-90deg);
  }

  /* Grain overlay */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999; opacity: 0.45;
  }

  .result-card {
    background: #141414;
    border: 1.5px solid #2a2a2a;
    border-radius: 20px;
  }

  .spectrum-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
  }
</style>

<div class="min-h-screen flex flex-col items-center justify-center px-4 py-14 bg-paper">

  <!-- Header -->
  <div class="text-center mb-10 fade-up" style="animation-delay: 0.05s">
    <p class="text-xs uppercase tracking-widest text-yellow-500/70 mb-2 font-medium">Ihr Ergebnis</p>
    <h1 class="serif text-4xl md:text-5xl font-black leading-tight">Zoll‑O‑Mat</h1>
    <p class="text-stone-700 text-sm mt-2">Auswertung Ihrer Antworten</p>
  </div>

  <!-- Gauge card -->
  <div class="result-card w-full max-w-lg p-8 mb-6 fade-up" style="animation-delay: 0.2s">

    <!-- SVG Gauge -->
    <div class="flex flex-col items-center mb-6">
      <svg viewBox="0 0 220 120" class="w-full max-w-xs" xmlns="http://www.w3.org/2000/svg">
        <!-- Track arc (half circle) -->
        <path d="M 20 110 A 90 90 0 0 1 200 110" fill="none" stroke="#222" stroke-width="18" stroke-linecap="round"/>
        <!-- Gradient arc — left = protektionismus (blue), right = globalisierung (amber) -->
        <defs>
          <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#3b82f6"/>
            <stop offset="50%"  stop-color="#6b7280"/>
            <stop offset="100%" stop-color="#e8b84b"/>
          </linearGradient>
        </defs>
        <path d="M 20 110 A 90 90 0 0 1 200 110" fill="none" stroke="url(#arcGrad)" stroke-width="18" stroke-linecap="round"/>
        <!-- Needle -->
        <line id="needle" x1="110" y1="110" x2="110" y2="28" stroke="#f0ede8" stroke-width="3" stroke-linecap="round"/>
        <circle cx="110" cy="110" r="6" fill="#f0ede8"/>
      </svg>

      <!-- Labels under gauge -->
      <div class="flex justify-between w-full max-w-xs px-2 -mt-1">
        <span class="spectrum-label text-blue-400">Protektionismus</span>
        <span class="spectrum-label text-yellow-500">Hyperglobalisierung</span>
      </div>
    </div>

    <!-- Score readout -->
    <div class="text-center mb-6">
      <p class="serif italic text-stone-500 text-sm mb-1">Ihr Score</p>
      <p id="score-display" class="serif text-2xl font-bold text-white">{{ answer }}</p>
      <p id="score-label" class="text-lg mt-2 font-medium"></p>
    </div>

    <!-- Bar spectrum -->
    <div class="mt-4">
      <div class="flex justify-between spectrum-label text-stone-500 mb-2">
        <span class="text-blue-400">Protektionistisch</span>
        <span class="text-yellow-500">Globalisiert</span>
      </div>
      <div class="h-2.5 bg-stone-800 rounded-full overflow-hidden">
        <div id="spectrum-bar" class="bar-fill h-full rounded-full"></div>
      </div>
    </div>
  </div>

  <!-- Description card -->
  <div class="result-card w-full max-w-lg p-8 fade-up" style="animation-delay: 0.4s">
    <h2 id="result-title" class="serif text-2xl text-white mb-3"></h2>
    <p id="result-desc" class="text-stone-400 leading-relaxed text-sm"></p>

    <!-- Spectrum position chips -->
    <div class="mt-6 flex flex-wrap gap-2" id="trait-chips"></div>
  </div>

  <!-- Retry link -->
  <a href="/page/zollomat" class="mt-10 fade-up text-stone-600 hover:text-stone-400 text-sm transition-colors underline underline-offset-4"
     style="animation-delay: 0.6s">
    ← Nochmal versuchen
  </a>

</div>

<script>
  // result is a float 0–1 passed from Flask: 0 = vollständig protektionistisch, 1 = vollständig globalisiert
  const raw = {{ result }};
  const score = Math.round(raw * 100);


  // Needle: -90° (left) to +90° (right)
  const needleDeg = -90 + (raw * 180);
  document.getElementById('needle').style.setProperty('--needle-deg', needleDeg + 'deg');

  // Bar
  const bar = document.getElementById('spectrum-bar');
  bar.style.setProperty('--target-width', score + '%');
  if (score < 35) {
    bar.style.background = 'linear-gradient(90deg, #3b82f6, #60a5fa)';
  } else if (score > 65) {
    bar.style.background = 'linear-gradient(90deg, #d97706, #e8b84b)';
  } else {
    bar.style.background = 'linear-gradient(90deg, #3b82f6, #e8b84b)';
  }

  // Result profiles
  const profiles = [
    {
      min: 0, max: 20,
      label: "Überzeugter Protektionist",
      color: "text-blue-400",
      title: "Nationale Eigenständigkeit zuerst",
      desc: "Sie priorisieren klar die Unabhängigkeit und Sicherheit der heimischen Wirtschaft. Starke Zölle, geschützte Industrien und Versorgungssicherheit stehen für Sie über den Vorteilen des freien Handels. Diese Haltung teilen Strömungen, die Souveränität und Resilienz über Effizienz stellen.",
      chips: ["Hohe Zölle", "Heimische Industrie", "Versorgungssicherheit", "Nationale Souveränität"]
    },
    {
      min: 20, max: 40,
      label: "Moderater Protektionist",
      color: "text-blue-300",
      title: "Vorsichtiger Pragmatiker",
      desc: "Sie sehen die Vorteile des Handels, möchten aber strategische Sektoren und vulnerable Branchen schützen. Ein selektiver Einsatz von Zöllen und Handelsbarrieren erscheint Ihnen sinnvoll — besonders in Zeiten geopolitischer Unsicherheit.",
      chips: ["Selektive Zölle", "Strategische Industrien", "Geopolitische Vorsicht"]
    },
    {
      min: 40, max: 60,
      label: "Ausgewogene Mitte",
      color: "text-stone-300",
      title: "Pragmatischer Kompromiss",
      desc: "Ihre Ansichten spiegeln eine nuancierte Abwägung wider: Freihandel dort, wo er Wohlstand schafft — Schutz dort, wo nationale Interessen oder Versorgungssicherheit auf dem Spiel stehen. Sie stehen für einen regulierten, fairen Welthandel.",
      chips: ["Fairer Handel", "Regelbasierte Ordnung", "WTO", "Ausgewogen"]
    },
    {
      min: 60, max: 80,
      label: "Marktorientiert",
      color: "text-yellow-400",
      title: "Offene Märkte, geteilter Wohlstand",
      desc: "Sie vertrauen auf die Kraft des Marktes und glauben, dass offener Handel Wohlstand für alle schafft. Zölle sehen Sie meist als ineffizient und kontraproduktiv. Internationale Kooperation und Spezialisierung sind für Sie der richtige Weg.",
      chips: ["Niedrige Zölle", "Markteffizienz", "Internationale Kooperation", "Verbraucherpreise"]
    },
    {
      min: 80, max: 101,
      label: "Überzeugter Globalist",
      color: "text-yellow-500",
      title: "Grenzenloser Welthandel",
      desc: "Für Sie ist maximale wirtschaftliche Integration das Ideal. Güter, Kapital und Dienstleistungen sollen ungehindert fließen — Zölle sind für Sie Relikte des Nationalismus. Sie setzen auf globale Institutionen und internationale Arbeitsteilung als Motor für Wohlstand und Frieden.",
      chips: ["Freihandel", "Hyperglobalisierung", "WTO-Stärkung", "Globale Effizienz"]
    }
  ];

  const profile = profiles.find(p => score >= p.min && score < p.max) || profiles[profiles.length - 1];

  document.getElementById('score-label').textContent = profile.label;
  document.getElementById('score-label').className = 'text-lg mt-2 font-semibold ' + profile.color;
  document.getElementById('result-title').textContent = profile.title;
  document.getElementById('result-desc').textContent = profile.desc;

  const chipContainer = document.getElementById('trait-chips');
  profile.chips.forEach(chip => {
    const el = document.createElement('span');
    el.className = 'text-xs px-3 py-1 rounded-full bg-stone-800 text-stone-400 border border-stone-700';
    el.textContent = chip;
    chipContainer.appendChild(el);
  });
</script>

{% endblock %}
